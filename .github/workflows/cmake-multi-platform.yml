name: CI

on:
  push:
    branches: [ main, development, 'feature/**' ]
  pull_request:
    branches: [ main, development, 'feature/**' ]

jobs:
  clang-format:
    name: Run clang-format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm --version=20.1.8 -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Run clang-format
        shell: bash
        run: |
          git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc' '*.ixx' \
            | while read -r f; do
                clang-format --style=file --dry-run --Werror "$f" || exit 1
              done

  build-windows:
    runs-on: windows-latest
    needs: clang-format

    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang, clang-cl]
        build_type: [Debug, Release]
        include:
          - compiler: msvc
            name: msvc
          - compiler: clang
            name: clang20
            llvm_version: 20.1.8
          - compiler: clang-cl
            name: clang20-cl
            llvm_version: 20.1.8

    name: Windows / ${{ matrix.name }} / ${{ matrix.build_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        if: matrix.compiler != 'msvc'
        shell: pwsh
        run: |
          choco install llvm --version=${{ matrix.llvm_version }} -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Tool versions
        if: matrix.compiler != 'msvc'
        run: |
          clang --version
          clang-format --version
          clang-tidy --version

      - name: Configure
        shell: pwsh
        run: |
          $isFeature = "${{ github.ref }}".StartsWith("refs/heads/feature/")
          $isDebug   = "${{ matrix.build_type }}" -eq "Debug"

          $enableClangSan =
            (-not $isFeature) `
            -and $isDebug `
            -and ("${{ matrix.compiler }}" -eq "clang")

          $enableMsvcAsan =
            (-not $isFeature) `
            -and $isDebug `
            -and ("${{ matrix.compiler }}" -eq "msvc")

          if ("${{ matrix.compiler }}" -eq "msvc") {
              $asanFlags = ""
              if ($enableMsvcAsan) {
                  $asanFlags = "-DCMAKE_CXX_FLAGS=/fsanitize=address"
              }

              cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
                -DCMAKE_CXX_STANDARD=23 `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
                $asanFlags

          } elseif ("${{ matrix.compiler }}" -eq "clang") {
              $sanFlags = ""
              if ($enableClangSan) {
                  $sanFlags = "-DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'"
              }

              cmake -S . -B build -G Ninja `
                -DCMAKE_C_COMPILER=clang `
                -DCMAKE_CXX_COMPILER=clang++ `
                -DCMAKE_CXX_STANDARD=23 `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
                $sanFlags

          } elseif ("${{ matrix.compiler }}" -eq "clang-cl") {
              cmake -S . -B build -G Ninja `
                -DCMAKE_C_COMPILER=clang-cl `
                -DCMAKE_CXX_COMPILER=clang-cl `
                -DCMAKE_CXX_STANDARD=23 `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          }

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}-${{ matrix.build_type }}
          path: build

  clang-tidy:
    name: Run clang-tidy
    runs-on: windows-latest
    needs: build-windows
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    steps:
      - uses: actions/checkout@v4
      - name: Download Release build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-clang20-Release
          path: build
      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm --version=20.1.8 -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
      - name: Run clang-tidy
        shell: bash
        run: |
          git ls-files '*.cpp' '*.cxx' '*.cc' '*.ixx' \
            | while read -r f; do
                clang-tidy "$f" \
                  --warnings-as-errors='*' \
                  --extra-arg=-std=c++23 \
                  -- \
                  -I"${{ github.workspace }}/compiler/platformlib/include" \
                  -I"${{ github.workspace }}/compiler/platformlib/include/platformlib" \
                  -I"${{ github.workspace }}/compiler/ecpps/src" \
                  -I"${{ github.workspace }}/compiler/utilitieslib/include/utilitieslib" \
                  || exit 1
              done

  run-tests:
    name: Run Tests
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download Debug and Release build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-msvc-Debug
          path: build/Debug
      - uses: actions/download-artifact@v4
        with:
          name: build-msvc-Release
          path: build/Release
      - name: Run tests (optional)
        shell: bash
        run: |
          for cfg in Debug Release; do
            if [ -f "build/$cfg/CTestTestfile.cmake" ]; then
              ctest --test-dir build/$cfg -C "$cfg"
            else
              echo "No tests found for $cfg, skipping"
            fi
          done
