name: CI

on:
  push:
    branches: [ main, development, 'feature/**' ]
  pull_request:
    branches: [ main, development, 'feature/**' ]
    types: [opened, synchronize, reopened, labeled, unlabeled] 

jobs:
  setup-llvm:
    name: Install LLVM
    runs-on: windows-latest
    if: |
      github.event_name != 'pull_request' || 
      !contains(github.event.pull_request.labels.*.name, 'blocked')
    outputs:
      llvm-path: ${{ steps.set-path.outputs.llvm-path }}
    steps:
      - name: Install LLVM
        shell: pwsh
        id: set-path
        run: |
          choco install llvm --version=20.1.8 -y
          echo "::set-output name=llvm-path::C:\Program Files\LLVM\bin"

  clang-format:
    name: Run clang-format
    runs-on: windows-latest
    needs: setup-llvm
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format in parallel
        shell: bash
        env:
          PATH: ${{ needs.setup-llvm.outputs.llvm-path }}:$PATH
        run: |
          git ls-files '*.cpp' '*.c' '*.h' '*.hpp' '*.cxx' '*.cc' '*.ixx' \
            | xargs -P $(nproc) -I {} clang-format --style=file --dry-run --Werror "{}"

  build-windows:
    runs-on: windows-latest
    needs: clang-format
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang, clang-cl]
        build_type: [Debug, Release]
        include:
          - compiler: msvc
            name: msvc
          - compiler: clang
            name: clang20
            llvm_version: 20.1.8
          - compiler: clang-cl
            name: clang20-cl
            llvm_version: 20.1.8
    name: Windows / ${{ matrix.name }} / ${{ matrix.build_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        if: matrix.compiler != 'msvc'
        shell: pwsh
        run: |
          choco install llvm --version=${{ matrix.llvm_version }} -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Configure
        shell: pwsh
        run: |
          $isFeature = "${{ github.ref }}".StartsWith("refs/heads/feature/")
          $isDebug = "${{ matrix.build_type }}" -eq "Debug"

          $enableClangSan = (-not $isFeature) -and $isDebug -and ("${{ matrix.compiler }}" -eq "clang")
          $enableMsvcSan = (-not $isFeature) -and $isDebug -and ("${{ matrix.compiler }}" -eq "msvc")

          if ("${{ matrix.compiler }}" -eq "msvc") {
              $asanFlags = ""
              if ($enableMsvcSan) { $asanFlags = "-DCMAKE_CXX_FLAGS=/fsanitize=address" }
              cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
                -DCMAKE_CXX_STANDARD=23 `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
                $asanFlags
          } elseif ("${{ matrix.compiler }}" -eq "clang") {
              $sanFlags = @()
              if ($enableClangSan) {
                  $sanFlags += "-DCMAKE_CXX_FLAGS=-fsanitize=address,undefined -fno-omit-frame-pointer"
                  $sanFlags += "-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined"
              }
              cmake -S . -B build -G Ninja `
                -DCMAKE_C_COMPILER=clang `
                -DCMAKE_CXX_COMPILER=clang++ `
                -DCMAKE_CXX_STANDARD=23 `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
                $sanFlags
          } elseif ("${{ matrix.compiler }}" -eq "clang-cl") {
              cmake -S . -B build -G Ninja `
                -DCMAKE_C_COMPILER=clang-cl `
                -DCMAKE_CXX_COMPILER=clang-cl `
                -DCMAKE_CXX_STANDARD=23 `
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          }

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run tests (ASan/UBSan)
        if: ${{ (matrix.compiler == 'clang' || matrix.compiler == 'msvc') && matrix.build_type == 'Debug' }}
        shell: pwsh
        run: |
          if ($env:ASAN_OPTIONS -eq $null) { $env:ASAN_OPTIONS="abort_on_error=1" }
          if ($env:UBSAN_OPTIONS -eq $null) { $env:UBSAN_OPTIONS="print_stacktrace=1" }
          ctest --test-dir build/compiler --output-on-failure

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}-${{ matrix.build_type }}
          path: build

  clang-tidy:
    name: Run clang-tidy
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download Release build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-clang20-Release
          path: build
      - name: Run clang-tidy in parallel
        shell: bash
        env:
          PATH: C:\Program Files\LLVM\bin:$PATH
        run: |
          git ls-files '*.cpp' '*.cxx' '*.cc' '*.ixx' \
          | xargs -P $(nproc) -I {} clang-tidy {} \
              --warnings-as-errors='*' \
              --extra-arg=-std=c++23 \
              -- \
              -I"${GITHUB_WORKSPACE}/compiler/platformlib/include" \
              -I"${GITHUB_WORKSPACE}/compiler/platformlib/include/platformlib" \
              -I"${GITHUB_WORKSPACE}/compiler/ecpps/src" \
              -I"${GITHUB_WORKSPACE}/compiler/utilitieslib/include/utilitieslib"

  run-tests:
    name: Run Tests
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-msvc-Debug
          path: build/Debug
      - uses: actions/download-artifact@v4
        with:
          name: build-msvc-Release
          path: build/Release
      - name: Run tests
        shell: bash
        run: |
          for cfg in Debug Release; do
            [ -f "build/$cfg/CTestTestfile.cmake" ] && ctest --test-dir build/$cfg -C "$cfg" || echo "No tests for $cfg"
          done
