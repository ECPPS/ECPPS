name: CI

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        name:
          - msvc
          - clang20
          - clang21
          - clang21-format
        include:
          - name: msvc
            compiler: msvc

          - name: clang20
            compiler: clang
            llvm_version: 20.1.8

          - name: clang21
            compiler: clang
            llvm_version: 21.1.8

          - name: clang21-format
            compiler: clang
            llvm_version: 21.1.8
            run_format: true

    name: Windows / ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Update submodules
        run: git submodule update --init --depth 1

      - name: Install LLVM
        if: matrix.compiler == 'clang'
        shell: pwsh
        run: |
          choco install llvm --version=${{ matrix.llvm_version }} -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Tool versions
        if: matrix.compiler == 'clang'
        run: |
          clang --version
          clang-format --version
          clang-tidy --version

      - name: Configure (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_CXX_STANDARD=23

      - name: Configure (Clang)
        if: matrix.compiler == 'clang'
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DCMAKE_CXX_STANDARD=23

      - name: Build
        run: cmake --build build --config Release

      - name: Test (optional)
        shell: pwsh
        run: |
          if (Test-Path build\CTestTestfile.cmake) {
            ctest --test-dir build -C Release
          } else {
            echo "No tests found, skipping"
          }

      - name: clang-format
        if: matrix.run_format == true
        shell: bash
        run: |
          clang-format --version
          git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc' '*.ixx' \
            | while read -r f; do
                clang-format --style=file --dry-run --Werror "$f" || exit 1
              done

      - name: clang-tidy
        if: matrix.compiler == 'clang'
        shell: bash
        run: |
          echo "Running clang-tidy..."
          git ls-files '*.cpp' '*.cxx' '*.cc' '*.ixx' \
            | while read -r f; do
                clang-tidy "$f" \
                  --warnings-as-errors='*' \
                  --extra-arg=-std=c++23 \
                  || exit 1
              done
