name: CI

on:
  push:
    branches: [ main, development, 'feature/**' ]
  pull_request:
    branches: [ main, development, 'feature/**' ]
    types: [opened, synchronize, reopened, labeled, unlabeled] 

jobs:
  setup-llvm:
    name: Setup LLVM
    runs-on: windows-latest
    outputs:
      llvm-path: ${{ steps.set-path.outputs.llvm-path }}
    steps:
      - name: Install LLVM
        shell: pwsh
        run: choco install llvm --version=20.1.8 -y

      - name: Set LLVM path
        id: set-path
        shell: pwsh
        run: |
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          echo "::set-output name=llvm-path::C:\Program Files\LLVM\bin"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: $env:LOCALAPPDATA\ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install ccache
        shell: pwsh
        run: |
          choco install ccache -y
          echo "C:\Program Files\ccache" >> $env:GITHUB_PATH

  clang-format:
    name: Run clang-format
    runs-on: windows-latest
    needs: setup-llvm
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format in parallel
        shell: bash
        env:
          PATH: ${{ needs.setup-llvm.outputs.llvm-path }}:$PATH
        run: |
          git ls-files '*.cpp' '*.c' '*.h' '*.hpp' '*.cxx' '*.cc' '*.ixx' \
            | xargs -P $(nproc) -I {} clang-format --style=file --dry-run --Werror "{}"

  build-windows:
    runs-on: windows-latest
    needs: clang-format
    strategy:
      fail-fast: true
      matrix:
        compiler: [MSVC, Clang, Clang-cl]
        build_type: [Debug, Release]
        include:
          - compiler: MSVC
            name: msvc
          - compiler: Clang
            name: clang20
            llvm_version: 20.1.8
          - compiler: Clang-cl
            name: clang20-cl
            llvm_version: 20.1.8
    name: Windows / ${{ matrix.name }} / ${{ matrix.build_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM to PATH
        if: matrix.compiler == 'Clang'
        shell: pwsh
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Setup MSVC Developer Environment
        if: matrix.compiler == 'MSVC'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: pwsh
        run: cmake -S . -G Ninja --preset x64-${{ matrix.compiler }}-${{ matrix.build_type }}
      - name: Build
        shell: pwsh
        run: cmake --build build --preset "x64-${{ matrix.compiler }}-${{ matrix.build_type }}-Parallel" --parallel
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}-${{ matrix.build_type }}
          path: |
            out/build
            out/build/compile_commands.json

  build-windows-asan:
    name: Windows / MSVC / ASan
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add LLVM to PATH
        shell: pwsh
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Configure (ASan)
        shell: pwsh
        run: |
          cmake -S . --preset x64-MSVC-Debug-ASan

      - name: Build (ASan)
        shell: pwsh
        run: cmake --build build-asan --preset x64-MSVC-Debug-ASan-Parallel --parallel

      - name: Run tests (ASan)
        shell: pwsh
        run: |
          $env:ASAN_OPTIONS="abort_on_error=1"
          ctest --test-dir out/build/x64-Debug-MSVC-ASan --output-on-failure

  clang-tidy:
    name: Run clang-tidy
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download Release build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-clang20-Release
          path: build
      - name: Run clang-tidy in parallel
        shell: bash
        env:
          PATH: C:\Program Files\LLVM\bin:$PATH
        run: |
          git ls-files '*.cpp' '*.cxx' '*.cc' '*.ixx' \
          | xargs -P $(nproc) -I {} clang-tidy {} \
              -p build/x64-Clang-Release \
              --warnings-as-errors='*' \
              --extra-arg=-std=c++23

  run-tests:
    name: Run Tests
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-msvc-Debug
          path: build/Debug
      - uses: actions/download-artifact@v4
        with:
          name: build-msvc-Release
          path: build/Release
      - name: Run tests
        shell: bash
        run: |
          for cfg in Debug Release; do
            [ -f "build/$cfg/CTestTestfile.cmake" ] && ctest --test-dir out/build/testing/compiler --output-on-failure -C "$cfg" || echo "No tests for $cfg"
          done
