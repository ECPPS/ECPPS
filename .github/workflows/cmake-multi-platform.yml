name: CI

on:
  push:
    branches: [ main, development, 'feature/**' ]
  pull_request:
    branches: [ main, development, 'feature/**' ]
    types: [opened, synchronize, reopened, labeled, unlabeled] 

jobs:
  setup-llvm:
    name: Setup LLVM
    runs-on: windows-latest
    outputs:
      llvm-path: ${{ steps.set-path.outputs.llvm-path }}
    steps:
      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm --version=20.1.8 -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

  clang-format:
    name: Run clang-format
    runs-on: windows-latest
    needs: setup-llvm
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format
        shell: bash
        env:
          PATH: ${{ needs.setup-llvm.outputs.llvm-path }}:$PATH
        run: |
          git ls-files '*.cpp' '*.c' '*.h' '*.hpp' '*.cxx' '*.cc' '*.ixx' \
            | xargs -P $(nproc) -I {} clang-format --style=file --dry-run --Werror "{}"

  build-windows:
    runs-on: windows-latest
    needs: clang-format
    strategy:
      fail-fast: true
      matrix:
        compiler: [msvc, clang, clang-cl]
        build_type: [Debug, Release]
        include:
          - compiler: MSVC
            name: msvc
          - compiler: Clang
            name: clang20
            llvm_version: 20.1.8
          - compiler: Clang-cl
            name: clang20-cl
            llvm_version: 20.1.8
    name: Windows / ${{ matrix.name }} / ${{ matrix.build_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM to PATH
        if: matrix.compiler == 'Clang'
        shell: pwsh
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Tool versions
        if: matrix.compiler != 'msvc'
        run: |
          clang --version
          clang-format --version
          clang-tidy --version

      - name: Configure
        shell: pwsh
        run: |
          if ("${{ matrix.compiler }}" -eq "msvc") {
              cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          } elseif ("${{ matrix.compiler }}" -eq "clang") {
              cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          } elseif ("${{ matrix.compiler }}" -eq "clang-cl") {
              cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_CXX_STANDARD=23 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          }

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}-${{ matrix.build_type }}
          path: build

  clang-tidy:
    name: Run clang-tidy
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download Release build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-clang20-Release
          path: build
      - name: Run clang-tidy in parallel
        shell: bash
        env:
          PATH: C:\Program Files\LLVM\bin:$PATH
        run: |
          git ls-files '*.cpp' '*.cxx' '*.cc' '*.ixx' \
          | xargs -P $(nproc) -I {} clang-tidy {} \
              --warnings-as-errors='*' \
              --extra-arg=-std=c++23 \
              -- \
              -I"${GITHUB_WORKSPACE}/compiler/platformlib/include" \
              -I"${GITHUB_WORKSPACE}/compiler/platformlib/include/platformlib" \
              -I"${GITHUB_WORKSPACE}/compiler/ecpps/src" \
              -I"${GITHUB_WORKSPACE}/compiler/utilitieslib/include/utilitieslib"

  run-tests:
    name: Run Tests
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-msvc-Debug
          path: build/Debug
      - uses: actions/download-artifact@v4
        with:
          name: build-msvc-Release
          path: build/Release
      - name: Run tests
        shell: bash
        run: |
          for cfg in Debug Release; do
            if [ -f "build/$cfg/CTestTestfile.cmake" ]; then
              ctest --test-dir build/$cfg -C "$cfg"
            else
              echo "No tests found for $cfg, skipping"
            fi
          done
