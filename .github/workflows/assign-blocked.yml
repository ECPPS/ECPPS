name: Auto move issues when necessary

on:
  issues:
    types: [labeled]

jobs:
  move_issue:
    if: github.event.label.name == 'blocked'
    runs-on: ubuntu-latest
    steps:
      - name: Move to Blocked column
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL="${{ github.event.issue.url }}"
          PROJECT_ID=$(gh api "$ISSUE_URL/projects" --jq '.[0].id')
          COLUMN_ID=$(gh api /projects/$PROJECT_ID/columns --jq '.[] | select(.name=="Blocked") | .id')
          CARD_ID=$(gh api /projects/$PROJECT_ID/columns --jq '.[] | .id' |
              xargs -I {} gh api /projects/columns/{}/cards --jq '.[] | select(.content_url=="'"$ISSUE_URL"'") | .id')

          gh api --method POST /projects/columns/$COLUMN_ID/cards \
              -F "content_id=${{ github.event.issue.id }}" \
              -F "content_type=Issue"
